<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#000; overflow:hidden; cursor:none; }
canvas { display:block; }
#rocket-cursor { position:fixed; pointer-events:none; z-index:9999; transform:translate(-50%,-50%) rotate(-45deg); transition:transform 0.1s; }
#label { position:fixed; top:14px; left:0; right:0; text-align:center; font-family:sans-serif; font-size:10px; letter-spacing:3px; color:rgba(140,130,170,0.22); pointer-events:none; }
#dots { position:fixed; bottom:22px; left:0; right:0; display:flex; justify-content:center; gap:48px; pointer-events:all; }
.dot { width:28px; height:28px; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; opacity:0; transition:opacity 1.2s; }
.dot .orb { width:5px; height:5px; border-radius:50%; background:rgba(160,150,200,0.25); transition:background 0.8s, transform 0.8s; }
.dot .lbl { font-family:sans-serif; font-size:8px; letter-spacing:2px; color:rgba(150,140,190,0); transition:color 0.8s; white-space:nowrap; }
.dot:hover .orb { background:rgba(180,170,220,0.55); transform:scale(1.5); }
.dot:hover .lbl { color:rgba(150,140,190,0.45); }
#hint { position:fixed; bottom:8px; left:0; right:0; text-align:center; font-family:sans-serif; font-size:8px; letter-spacing:4px; color:rgba(120,110,160,0); pointer-events:none; transition:color 3s; }
#chai { position:fixed; bottom:18px; right:20px; opacity:0; transition:opacity 3s; z-index:100; }
#chai a { display:flex; align-items:center; gap:7px; text-decoration:none; background:rgba(30,22,45,0.7); border:0.5px solid rgba(160,140,200,0.15); border-radius:20px; padding:7px 13px 7px 10px; backdrop-filter:blur(4px); }
#chai a:hover { background:rgba(40,30,60,0.85); border-color:rgba(160,140,200,0.3); }
#chai span.ic { font-size:14px; }
#chai span.tx { font-family:sans-serif; font-size:9px; letter-spacing:1.5px; color:rgba(170,155,210,0.6); }
#secret { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); font-family:sans-serif; font-size:9px; letter-spacing:3px; color:rgba(180,170,210,0); pointer-events:none; transition:color 1.5s, opacity 1.5s; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="label">drift</div>
<svg id="rocket-cursor" width="18" height="28" viewBox="0 0 18 28" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M9 1 C9 1 3 8 3 16 L9 20 L15 16 C15 8 9 1 9 1Z" fill="rgba(200,195,225,0.7)" stroke="rgba(160,150,200,0.4)" stroke-width="0.5"/>
  <ellipse cx="9" cy="13" rx="3" ry="3.5" fill="rgba(80,120,170,0.6)"/>
  <path d="M3 16 L0 22 L5 19Z" fill="rgba(160,100,80,0.5)"/>
  <path d="M15 16 L18 22 L13 19Z" fill="rgba(160,100,80,0.5)"/>
  <path d="M6 20 Q9 26 12 20" stroke="rgba(220,160,80,0.35)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
<div id="dots">  <div class="dot" id="d-read"   onclick="setActivity('read')">  <div class="orb"></div><div class="lbl">read</div></div>
  <div class="dot" id="d-nap"    onclick="setActivity('nap')">   <div class="orb"></div><div class="lbl">nap</div></div>
  <div class="dot" id="d-bubble" onclick="setActivity('bubble')"><div class="orb"></div><div class="lbl">bubble</div></div>
  <div class="dot" id="d-stretch"onclick="setActivity('stretch')"><div class="orb"></div><div class="lbl">stretch</div></div>
</div>
<div id="chai">
  <a href="https://buymeachai.ezee.li/diyanosauras" target="_blank" rel="noopener noreferrer">
    <span class="ic">🍵</span>
    <span class="tx">buy me a chai</span>
  </a>
</div>
<div id="hint">· · ·</div>
<div id="secret" id="sec"></div>
<script>
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
let W, H;
function resize(){ W = cv.width = window.innerWidth; H = cv.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const startMs = Date.now();
let t = 0;
function dim(){ const s=(Date.now()-startMs)/1000; return Math.max(0.12, 1-s/1500); }

// Stars
let stars=[];
function makeStars(){
  stars = Array.from({length:200},()=>({
    x:Math.random(), y:Math.random(),
    r:0.4+Math.random()*1.1,
    ph:Math.random()*Math.PI*2,
    sp:0.003+Math.random()*0.009,
    focus:false
  }));
  const fi = stars.findIndex(s => s.y < 0.45);
  const fIdx = fi >= 0 ? fi : 80;
  stars[fIdx].focus=true; stars[fIdx].r=1.8;
}
makeStars();

// Blobs 4-7-8
const blobs = Array.from({length:6},(_,i)=>({
  x:0.15+Math.random()*0.7, y:0.15+Math.random()*0.7,
  br:0.07+Math.random()*0.1,
  ph:(i/6)*Math.PI*2,
  hue:[200,225,255,275,245,215][i],
  vx:(Math.random()-0.5)*0.00006,
  vy:(Math.random()-0.5)*0.00006,
}));
function breathe(ph,t){
  const cyc=19, p=((t*0.055+ph*cyc/(Math.PI*2))%cyc+cyc)%cyc;
  if(p<4) return 0.72+0.28*(p/4);
  if(p<11) return 1;
  return 1-0.28*((p-11)/8);
}

// Astronaut state
const astro = {
  x:0.5, y:0.5,       // current pos (normalised)
  tx:0.5, ty:0.5,     // target pos
  vx:0, vy:0,         // velocity
  bob:0,
  activity:'float',   // float | read | nap | bubble | stretch | stargaze | wave | journal
  actTimer:0,
  nudged:false,       // true briefly after a click nudge
  stillTimer:0,       // frames cursor hasn't moved
  tripleClicks:[],
};

// Bubble
let bubbles=[];

// Activity chooser
function setActivity(name){
  if(astro.activity===name) return;
  astro.activity=name;
  astro.actTimer=0;
  bubbles=[];
  showSecret('');
}

// Easter egg: still cursor 10s
const rocketEl = document.getElementById('rocket-cursor');
let cursorX=-1, cursorY=-1, cursorMoved=Date.now();
let mouseX=W/2, mouseY=H/2;
let rocketX=W/2, rocketY=H/2, rocketAngle=-45;
window.addEventListener('mousemove', e=>{
  mouseX = e.clientX; mouseY = e.clientY;
  const dx=e.clientX-cursorX, dy=e.clientY-cursorY;
  if(Math.abs(dx)+Math.abs(dy)>8){ cursorX=e.clientX; cursorY=e.clientY; cursorMoved=Date.now(); }
});

// Easter egg: triple slow tap
cv.addEventListener('click', e=>{
  const now=Date.now();
  astro.tripleClicks.push(now);
  astro.tripleClicks = astro.tripleClicks.filter(c=>now-c<4000);
  if(astro.tripleClicks.length>=3){
    astro.tripleClicks=[];
    setActivity('journal');
    showSecret('journaling...');
    return;
  }
  // Focus star tap check
  const fs=stars.find(s=>s.focus)||stars[80];
  const sx=fs.x*W, sy=fs.y*H;
  if(Math.hypot(e.clientX-sx,e.clientY-sy)<30){
    setActivity('stargaze');
    showSecret('stargazing...');
    return;
  }
  // Nudge — very gentle push toward click
  astro.tx = e.clientX/W;
  astro.ty = e.clientY/H;
  astro.nudged=true;
  if(astro.activity==='nap'||astro.activity==='read'||astro.activity==='journal') {
    astro.activity='float';
  }
});

// Alien tap easter egg
let alienTapped=false;
cv.addEventListener('click', e=>{
  if(!alien) return;
  const ax=alien.x*W, ay=alien.y*H;
  if(Math.hypot(e.clientX-ax,e.clientY-ay)<50){
    alienTapped=true;
    showSecret('new friends ✦');
  }
});

function showSecret(msg){
  const el=document.getElementById('secret');
  el.textContent=msg;
  el.style.color='rgba(180,170,210,0.4)';
  clearTimeout(showSecret._t);
  showSecret._t=setTimeout(()=>{ el.style.color='rgba(180,170,210,0)'; },3000);
}

// Reveal chai button after 90s — unobtrusive, earned
setTimeout(()=>{ document.getElementById('chai').style.opacity='1'; }, 90000);

// Reveal dots after 8s
setTimeout(()=>{ document.querySelectorAll('.dot').forEach(d=>d.style.opacity=1); },8000);

// Alien
let alien=null, alienCd=30+Math.random()*60, alienState='gone';
function spawnAlien(){
  const left=Math.random()<0.5;
  alien={ x:left?-0.1:1.1, y:0.25+Math.random()*0.5,
    tx:0.35+Math.random()*0.28, ty:0.3+Math.random()*0.35,
    type:Math.floor(Math.random()*3), alpha:0, wave:0, scan:0, vt:0,
    going:left?1:-1, bumping:false, bumpT:0 };
  alienState='in';
}

// Drawing helpers
function drawBlob(b){
  const sc=breathe(b.ph,t), r=b.br*Math.min(W,H)*sc;
  const bx=b.x*W, by=b.y*H;
  const g=ctx.createRadialGradient(bx,by,0,bx,by,r);
  const d=dim();
  g.addColorStop(0,  `hsla(${b.hue},32%,42%,${0.12*d})`);
  g.addColorStop(0.5,`hsla(${b.hue},28%,35%,${0.05*d})`);
  g.addColorStop(1,  `hsla(${b.hue},24%,28%,0)`);
  ctx.beginPath(); ctx.arc(bx,by,r,0,Math.PI*2);
  ctx.fillStyle=g; ctx.fill();
}

function drawStar(s){
  const d=dim(); let a,r;
  if(s.focus){
    const cyc=70,p=(t*0.055)%cyc;
    if(p<22) a=0.06+0.38*(p/22);
    else if(p<45) a=0.44;
    else a=0.44-0.38*((p-45)/25);
    r=s.r*(1+0.4*Math.sin(p*Math.PI/70));
  } else {
    a=0.07+0.12*Math.sin(s.ph+t*s.sp); r=s.r;
  }
  ctx.beginPath(); ctx.arc(s.x*W,s.y*H,r,0,Math.PI*2);
  ctx.fillStyle=`rgba(215,210,245,${a*d})`; ctx.fill();
}

function drawAstroBase(d,a_override){
  const a=(a_override||0.6)*d;
  // body
  ctx.fillStyle=`rgba(185,180,205,${a})`;
  ctx.beginPath(); ctx.ellipse(0,5,10,13,0,0,Math.PI*2); ctx.fill();
  // helmet
  ctx.fillStyle=`rgba(205,200,225,${a*0.95})`;
  ctx.beginPath(); ctx.arc(0,-8,10,0,Math.PI*2); ctx.fill();
  // visor
  ctx.fillStyle=`rgba(70,115,155,${a*0.55})`;
  ctx.beginPath(); ctx.ellipse(0,-7,6,5,0,0,Math.PI*2); ctx.fill();
  // visor shine
  ctx.fillStyle=`rgba(180,210,240,${a*0.2})`;
  ctx.beginPath(); ctx.ellipse(-2,-9,2,1.5,-.4,0,Math.PI*2); ctx.fill();
}

function drawAstronaut(ax,ay,bob,d){
  const act=astro.activity;
  const actT=astro.actTimer;
  ctx.save();
  ctx.translate(ax*W, ay*H);

  if(act==='nap'){
    // curled up, slow rotation
    ctx.rotate(Math.sin(t*0.004)*0.08);
    ctx.scale(1,0.85);
    ctx.translate(0, 6+Math.sin(bob*0.3)*2);
    drawAstroBase(d);
    // arms folded
    ctx.strokeStyle=`rgba(175,170,195,${0.6*d})`;
    ctx.lineWidth=4; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-10,2); ctx.lineTo(-4,10); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(10,2); ctx.lineTo(4,10); ctx.stroke();
    // legs curled
    ctx.beginPath(); ctx.moveTo(-5,17); ctx.quadraticCurveTo(-14,22,-10,30); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(5,17); ctx.quadraticCurveTo(14,22,10,30); ctx.stroke();
    // z z z
    const zph=(t*0.015)%1;
    for(let i=0;i<3;i++){
      const zf=(zph+i*0.33)%1;
      ctx.fillStyle=`rgba(180,170,220,${(1-zf)*0.35*d})`;
      ctx.font=`${8+i*3}px sans-serif`;
      ctx.fillText('z', 14+i*5+zf*8, -10-i*10-zf*18);
    }
  } else if(act==='read'){
    ctx.translate(0, Math.sin(bob)*3);
    drawAstroBase(d);
    ctx.strokeStyle=`rgba(175,170,195,${0.6*d})`; ctx.lineWidth=4; ctx.lineCap='round';
    // arms angled down holding book
    ctx.beginPath(); ctx.moveTo(-10,2); ctx.lineTo(-13,14); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(10,2); ctx.lineTo(13,14); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-5,17); ctx.lineTo(-6,26); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(5,17); ctx.lineTo(6,26); ctx.stroke();
    // book
    ctx.fillStyle=`rgba(220,200,160,${0.55*d})`;
    ctx.beginPath(); ctx.roundRect(-9,13,18,12,2); ctx.fill();
    ctx.strokeStyle=`rgba(160,140,100,${0.4*d})`; ctx.lineWidth=0.5;
    ctx.beginPath(); ctx.moveTo(0,13); ctx.lineTo(0,25); ctx.stroke();
    // slow page turn every ~8s
    const pgph=(t*0.012)%1;
    if(pgph<0.1){
      ctx.fillStyle=`rgba(240,225,190,${0.4*d*(1-pgph/0.1)})`;
      ctx.beginPath(); ctx.ellipse(4,19,5*pgph,4,0.3,0,Math.PI*2); ctx.fill();
    }
  } else if(act==='bubble'){
    ctx.translate(0, Math.sin(bob)*3);
    drawAstroBase(d);
    ctx.strokeStyle=`rgba(175,170,195,${0.6*d})`; ctx.lineWidth=4; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-10,2); ctx.lineTo(-14,12); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(10,2); ctx.lineTo(10,12); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-5,17); ctx.lineTo(-6,26); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(5,17); ctx.lineTo(6,26); ctx.stroke();
    // spawn bubbles slowly
    if(t%120===0) bubbles.push({x:0,y:-18,r:0,maxR:8+Math.random()*10,vx:(Math.random()-.5)*0.3,vy:-0.4-Math.random()*0.3,age:0});
    bubbles=bubbles.filter(b=>b.age<300);
    for(const b of bubbles){
      b.x+=b.vx; b.y+=b.vy; b.age++; b.r=Math.min(b.maxR,b.r+0.15);
      const ba=Math.max(0,0.3-b.age/300)*d;
      ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
      ctx.strokeStyle=`rgba(160,200,220,${ba})`; ctx.lineWidth=0.8; ctx.stroke();
      ctx.fillStyle=`rgba(180,210,230,${ba*0.12})`; ctx.fill();
      // shine
      ctx.beginPath(); ctx.arc(b.x-b.r*0.3,b.y-b.r*0.3,b.r*0.18,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${ba*0.4})`; ctx.fill();
    }
  } else if(act==='stretch'){
    const sp=Math.sin(t*0.012); // very slow
    ctx.translate(0,Math.sin(bob)*3);
    drawAstroBase(d);
    ctx.strokeStyle=`rgba(175,170,195,${0.6*d})`; ctx.lineWidth=4; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-10,2); ctx.lineTo(-16-sp*10,2+sp*4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(10,2); ctx.lineTo(16+sp*10,2+sp*4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-5,17); ctx.lineTo(-6,26); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(5,17); ctx.lineTo(6,26); ctx.stroke();
  } else if(act==='stargaze'){
    ctx.translate(0,Math.sin(bob)*3);
    // tilt head back
    ctx.save(); ctx.rotate(-0.35);
    drawAstroBase(d);
    ctx.restore();
    ctx.strokeStyle=`rgba(175,170,195,${0.6*d})`; ctx.lineWidth=4; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-10,2); ctx.lineTo(-14,10); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(10,2); ctx.lineTo(14,10); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-5,17); ctx.lineTo(-6,26); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(5,17); ctx.lineTo(6,26); ctx.stroke();
    // dotted line to focus star
    const fs=stars[80];
    const fx=(fs.x*W-ax*W), fy=(fs.y*H-ay*H);
    ctx.setLineDash([2,6]); ctx.lineWidth=0.6;
    ctx.strokeStyle=`rgba(200,190,240,${0.18*d})`;
    ctx.beginPath(); ctx.moveTo(0,-18); ctx.lineTo(fx,fy); ctx.stroke();
    ctx.setLineDash([]);
  } else if(act==='wave'){
    ctx.translate(0,Math.sin(bob)*3);
    drawAstroBase(d);
    ctx.strokeStyle=`rgba(175,170,195,${0.6*d})`; ctx.lineWidth=4; ctx.lineCap='round';
    const wv=Math.sin(t*0.08)*12;
    ctx.beginPath(); ctx.moveTo(10,2); ctx.lineTo(18,wv-6); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-10,2); ctx.lineTo(-14,12); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-5,17); ctx.lineTo(-6,26); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(5,17); ctx.lineTo(6,26); ctx.stroke();
  } else if(act==='journal'){
    ctx.translate(0,Math.sin(bob)*2);
    ctx.rotate(-0.15);
    drawAstroBase(d);
    ctx.strokeStyle=`rgba(175,170,195,${0.6*d})`; ctx.lineWidth=4; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-10,2); ctx.lineTo(-11,16); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(10,2); ctx.lineTo(14,12); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-5,17); ctx.lineTo(-6,26); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(5,17); ctx.lineTo(6,26); ctx.stroke();
    // notebook
    ctx.fillStyle=`rgba(200,195,175,${0.5*d})`;
    ctx.beginPath(); ctx.roundRect(-8,14,16,14,1); ctx.fill();
    // pencil
    ctx.strokeStyle=`rgba(220,200,140,${0.55*d})`; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(10,10); ctx.lineTo(18,5); ctx.stroke();
    // slow scribble
    ctx.strokeStyle=`rgba(80,70,100,${0.35*d})`; ctx.lineWidth=0.7;
    const sc=actT*0.02;
    ctx.beginPath();
    for(let i=0;i<Math.min(sc,4);i++){
      ctx.moveTo(-5+i*2,18+i*2.5); ctx.lineTo(3+i,18+i*2.5);
    }
    ctx.stroke();
  } else {
    // float
    ctx.translate(0,Math.sin(bob)*5);
    drawAstroBase(d);
    ctx.strokeStyle=`rgba(175,170,195,${0.6*d})`; ctx.lineWidth=4; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-10,2); ctx.lineTo(-16,10); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(10,2); ctx.lineTo(16,10); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-5,17); ctx.lineTo(-6,26); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(5,17); ctx.lineTo(6,26); ctx.stroke();
  }
  ctx.restore();
}

function drawAlien(al,d){
  const ax=al.x*W, ay=al.y*H;
  ctx.save(); ctx.translate(ax,ay);
  ctx.globalAlpha=al.alpha*d*0.75;
  const cols=[
    ['rgba(100,190,145,','rgba(70,150,110,'],
    ['rgba(150,130,215,','rgba(110,90,175,'],
    ['rgba(195,155,110,','rgba(155,115,70,'],
  ][al.type];
  if(al.scan>0&&al.scan<1){
    const sy=25-al.scan*65;
    const sg=ctx.createLinearGradient(0,sy+40,0,sy-20);
    sg.addColorStop(0,'rgba(255,255,210,0)');
    sg.addColorStop(0.5,`rgba(255,255,200,${0.18*Math.sin(al.scan*Math.PI)})`);
    sg.addColorStop(1,'rgba(255,255,210,0)');
    ctx.fillStyle=sg; ctx.fillRect(-22,sy-20,44,60);
  }
  ctx.fillStyle=cols[0]+'0.82)';
  ctx.beginPath(); ctx.ellipse(0,5,12,15,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=cols[0]+'0.88)';
  ctx.beginPath(); ctx.ellipse(0,-13,14,12,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(15,10,25,0.92)';
  ctx.beginPath(); ctx.ellipse(-5,-15,4,5,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(5,-15,4,5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.55)';
  ctx.beginPath(); ctx.arc(-4,-17,1.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(6,-17,1.5,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle=cols[1]+'0.75)'; ctx.lineWidth=1.5;
  if(al.type===0){
    ctx.beginPath(); ctx.moveTo(-6,-23); ctx.lineTo(-10,-35); ctx.stroke();
    ctx.fillStyle=cols[0]+'0.9)'; ctx.beginPath(); ctx.arc(-10,-36,2.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.moveTo(6,-23); ctx.lineTo(10,-35); ctx.stroke();
    ctx.beginPath(); ctx.arc(10,-36,2.5,0,Math.PI*2); ctx.fill();
  } else if(al.type===1){
    ctx.beginPath(); ctx.moveTo(0,-23); ctx.lineTo(0,-37); ctx.stroke();
    ctx.fillStyle=cols[0]+'0.9)'; ctx.beginPath(); ctx.arc(0,-38,3,0,Math.PI*2); ctx.fill();
  } else {
    ctx.beginPath(); ctx.moveTo(-4,-23); ctx.bezierCurveTo(-14,-32,-18,-26,-13,-21); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(4,-23); ctx.bezierCurveTo(14,-32,18,-26,13,-21); ctx.stroke();
  }
  // bump/wave
  const wa = alienTapped
    ? Math.sin(al.bumpT*0.08)*8
    : 7*Math.sin(al.wave);
  ctx.strokeStyle=cols[0]+'0.8)'; ctx.lineWidth=4; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(12,0); ctx.lineTo(20+wa,-8+wa*0.4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-12,0); ctx.lineTo(-18,8); ctx.stroke();
  ctx.lineWidth=4;
  ctx.beginPath(); ctx.moveTo(-6,19); ctx.lineTo(-7,32); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(6,19); ctx.lineTo(7,32); ctx.stroke();
  ctx.globalAlpha=1; ctx.restore();
}

// Auto-nap after 5min idle (18000 frames at 60fps)
let idleFrames=0;

const hint=document.getElementById('hint');

function loop(){
  requestAnimationFrame(loop);
  t++; astro.actTimer++;
  const d=dim();

  // Rocket cursor — lazy glide toward mouse, slow angle lerp
  const rdx = mouseX - rocketX, rdy = mouseY - rocketY;
  rocketX += rdx * 0.04;
  rocketY += rdy * 0.04;
  const targetAngle = Math.atan2(rdy, rdx) * 180/Math.PI + 45;
  let angleDiff = ((targetAngle - rocketAngle + 540) % 360) - 180;
  rocketAngle += angleDiff * 0.03;
  rocketEl.style.left = rocketX+'px';
  rocketEl.style.top  = rocketY+'px';
  rocketEl.style.transform = `translate(-50%,-50%) rotate(${rocketAngle}deg)`;

  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
  for(const s of stars) drawStar(s);
  for(const b of blobs){
    b.x+=b.vx; b.y+=b.vy;
    if(b.x<-0.12) b.x=1.12; if(b.x>1.12) b.x=-0.12;
    if(b.y<-0.12) b.y=1.12; if(b.y>1.12) b.y=-0.12;
    drawBlob(b);
  }

  // Astronaut movement — only drifts gently when nudged, else nearly still
  astro.bob += 0.013;
  const ddx=astro.tx-astro.x, ddy=astro.ty-astro.y;
  const dist=Math.hypot(ddx,ddy);

  if(astro.nudged && dist>0.008){
    // Nudge: slow lazy drift toward target, like drifting through water
    astro.x += ddx*0.004;
    astro.y += ddy*0.004;
    if(dist<0.012) astro.nudged=false;
  } else {
    astro.nudged=false;
    // Idle: barely perceptible sway
    astro.tx = 0.5 + Math.sin(t*0.0008)*0.06;
    astro.ty = 0.5 + Math.cos(t*0.0006)*0.05;
    astro.x += (astro.tx-astro.x)*0.0006;
    astro.y += (astro.ty-astro.y)*0.0006;
  }

  // Easter egg: still for 10s → wave
  if(Date.now()-cursorMoved>10000 && astro.activity==='float'){
    astro.activity='wave'; astro.actTimer=0;
    showSecret('hello ✦');
    setTimeout(()=>{ if(astro.activity==='wave'){ astro.activity='float'; astro.actTimer=0; } },5000);
  }

  // Auto-nap after 5min of float
  idleFrames = (astro.activity==='float') ? idleFrames+1 : 0;
  if(idleFrames>18000){ setActivity('nap'); showSecret('falling asleep...'); idleFrames=0; }

  drawAstronaut(astro.x, astro.y, astro.bob, d);

  // Alien
  alienCd-=1/60;
  if(alienCd<=0&&alienState==='gone'){ spawnAlien(); alienCd=90+Math.random()*120; }
  if(alien){
    if(alienState==='in'){
      alien.x+=(alien.tx-alien.x)*0.003;
      alien.y+=(alien.ty-alien.y)*0.003;
      alien.alpha=Math.min(1,alien.alpha+0.003);
      alien.wave+=0.035; alien.vt++;
      alien.scan=Math.min(1,alien.vt/1800);
      if(alienTapped){ alien.bumpT++; }
      if(alien.vt>2200){ alienState='out'; alien.tx=alien.going>0?1.2:-0.2; }
    } else {
      alien.x+=(alien.tx-alien.x)*0.004;
      alien.alpha=Math.max(0,alien.alpha-0.002);
      if(alien.alpha<=0){ alien=null; alienState='gone'; alienTapped=false; }
    }
    if(alien) drawAlien(alien,d);
  }

  // Breath hint
  const cyc=19, cp=(t*0.055)%cyc;
  hint.style.color=(cp>11&&cp<13.5)?`rgba(120,110,160,${0.18*d})`:'rgba(120,110,160,0)';
}

loop();
</script>
